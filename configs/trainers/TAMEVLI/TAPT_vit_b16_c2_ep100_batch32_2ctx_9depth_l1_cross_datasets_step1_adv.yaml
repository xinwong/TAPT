DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 4
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 16

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.0, 0.0, 0.0]   # [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [1.0, 1.0, 1.0]    # [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.0026
  MAX_EPOCH: 2
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 1
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 20

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"

TRAINER:
  TAMEVLI:
    N_CTX_VISION: 2  # number of context vectors at the vision branch
    N_CTX_TEXT: 2  # number of context vectors at the language branch
    CTX_INIT: "a photo of a"
    PREC: "fp16"
    PROMPT_DEPTH_VISION: 9 # Max 12, minimum 0, for 0 it will act as shallow MaPLe (J=1)
    PROMPT_DEPTH_TEXT: 9  # Max 12, minimum 0, for 0 it will act as shallow MaPLe (J=1)
    NUM_EXPERTS: 5
    AUX_BALANCE_W: 0.0
    AUX_DIVERSITY_W: 0.0
    AUX_BALANCE_W_TARGET: 0.0
    AUX_DIVERSITY_W_TARGET: 0.0
    AUX_WARMUP_EPOCHS: 20
    DELTA_SCALE_INIT: 1.0
    TRAIN_TAU: True
    TRAIN_BASE_PROMPT: True
    GATE_MODE: "token_mean"
    GATE_HYBRID_LAMBDA: 0.7
    LR_MULT_GATE: 1.0
    LR_MULT_SCALE: 1.0
    ALPHA_MIN: 0.0
    ALPHA_MAX: 2.0
    TAU_MIN: 0.7
    TAU_MAX: 1.3

TAPT:
  LOADER: True
  LR: 5e-3
  RUN: True
  ALIGN_LAYER_FROM: 0
  ALIGN_LAYER_TO: 6
  TTA_STEPS: 1
  RESET: 1
  DISTR_ALIGN: True
  TAPT_THRESHOLD: 0.1
  ALIGN_THRESHOLD: 0.1
  ALIGN_TOKEN_SCOPE: "all"
  TAPT_LOSS: True
  DISTR_LOSS_W: 13.25
  GAMMA: 0.575
  BATCH_SIZE: 256

AT:
  TEST:
    EPS: 1
    ALPHA: 1
    STEPS: 100
  ALIGN_TYPE: "l1"
  ADVALIGN: True
